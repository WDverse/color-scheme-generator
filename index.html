<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Color Scheme Generator</title>
        <link rel="stylesheet" href="./assets/style/style.css">
    </head>

    <body>
        <div class="selectors">
            <div>
                <input id="seed-color" type="color">
            </div>

            <div>
                <label for="color-schemes">Choose a Color Scheme:</label>
                <select name="color-schemes" id="color-schemes">
                    <option value="Monochrome">Monochrome</option>
                    <option value="Monochrome-dark">Monochrome-dark</option>
                    <option value="Monochrome-light">Monochrome-light</option>
                    <option value="Analogic">Analogic</option>
                    <option value="Complement">Complement</option>
                    <option value="Analogic-complement">Analogic-complement</option>
                    <option value="Triad">Triad</option>
                </select>
            </div>
            <button id="get-color-btn">Get Color Scheme</button>
        </div>
        <div class="color-schemes-container" id="color-schemes-container"></div>
        <div class="hex-values" id="hex-values"></div>
        <script src="./assets/js/script.js"></script>
    </body>
</html>
